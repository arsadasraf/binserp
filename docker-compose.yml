services:
  backend:
    image: minsarsad/binserp-backend:v13
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/binsdb
    depends_on:
      - mongodb
    networks:
      - msmehub-net

  frontend:
    image: minsarsad/binserp-frontend:v11
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    # IMPORTANT: Update NEXT_PUBLIC_IP in your .env.prod to your EC2 Public IP or Domain
    depends_on:
      - backend
    networks:
      - msmehub-net

  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      # This ensures data persists on your EBS volume
      - /mongodb-data:/data/db
    networks:
      - msmehub-net

networks:
  msmehub-net:
    driver: bridge
